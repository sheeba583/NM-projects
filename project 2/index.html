<!DOCTYPE html>
<html>
<head>
    <title>Student Activity Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #34495e;
            text-align: center;
            padding: 10px;
        }

        nav button {
            padding: 8px 15px;
            margin: 5px;
            border: none;
            background: white;
            color: #2c3e50;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        nav button:hover {
            background: #ddd;
        }

        .container {
            width: 85%;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        form {
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .add-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
        }

        .add-btn:hover {
            background: #219150;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        .completed {
            color: green;
            font-weight: bold;
        }

        .pending {
            color: red;
            font-weight: bold;
        }

        .action-btn {
            padding: 5px 8px;
            border: none;
            cursor: pointer;
            border-radius: 3px;
            margin: 2px;
        }

        .complete-btn {
            background: #3498db;
            color: white;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }

        #progressSummary {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1>Student Activity Tracker</h1>
</header>

<nav>
    <button onclick="showHome()">Home</button>
    <button onclick="showActivities()">Activities</button>
</nav>

<div class="container">

    <div id="homeSection">
        <h2>Welcome</h2>
        <p>This application helps students manage and track their learning activities efficiently.</p>
    </div>

    <div id="activitySection" style="display:none;">

        <h2>Add New Activity</h2>
        <form onsubmit="addActivity(event)">
            <input type="text" id="activityName" placeholder="Activity Name" required>
            <textarea id="activityDesc" placeholder="Activity Description" required></textarea>
            <button type="submit" class="add-btn">Add Activity</button>
        </form>

        <h2>Activity List</h2>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="activityTable"></tbody>
        </table>

        <div id="progressSummary"></div>

    </div>

</div>

<footer>
    © 2026 Student Activity Tracker | Designed for Web Development Demo
</footer>

<script>
    let activities = [];

    function showHome() {
        document.getElementById("homeSection").style.display = "block";
        document.getElementById("activitySection").style.display = "none";
    }

    function showActivities() {
        document.getElementById("homeSection").style.display = "none";
        document.getElementById("activitySection").style.display = "block";
        displayActivities();
    }

    function addActivity(event) {
        event.preventDefault();

        const name = document.getElementById("activityName").value;
        const desc = document.getElementById("activityDesc").value;

        activities.push({ name, desc, status: "Pending" });

        document.getElementById("activityName").value = "";
        document.getElementById("activityDesc").value = "";

        displayActivities();
    }

    function displayActivities() {
        const table = document.getElementById("activityTable");
        table.innerHTML = "";

        activities.forEach((activity, index) => {
            table.innerHTML += `
                <tr>
                    <td>${activity.name}</td>
                    <td>${activity.desc}</td>
                    <td class="${activity.status === "Completed" ? "completed" : "pending"}">
                        ${activity.status}
                    </td>
                    <td>
                        <button class="action-btn complete-btn" onclick="markCompleted(${index})">Complete</button>
                        <button class="action-btn delete-btn" onclick="deleteActivity(${index})">Delete</button>
                    </td>
                </tr>
            `;
        });

        updateProgress();
    }

    function markCompleted(index) {
        activities[index].status = "Completed";
        displayActivities();
    }

    function deleteActivity(index) {
        activities.splice(index, 1);
        displayActivities();
    }

    function updateProgress() {
        const completed = activities.filter(a => a.status === "Completed").length;
        document.getElementById("progressSummary").innerText =
            "Progress: " + completed + " / " + activities.length + " activities completed";
    }
</script>

</body>
</html>
